name: SwiggyZone CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate --schema=apps/api/prisma/schema.prisma

    - name: Run Linter
      run: npm run lint

    - name: Run Prettier Formatter Check
      run: npx prettier --check "**/*.{ts,tsx,js,json,css,md}"

    - name: Build Packages
      run: |
        npm run build --workspace=@swiggyzone/shared
        npm run build --workspace=@swiggyzone/ui

    - name: Build Applications
      run: |
        npm run build --workspace=@swiggyzone/api
        npm run build --workspace=@swiggyzone/web
