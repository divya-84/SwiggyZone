version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: swiggyzone-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: swiggyzone
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - swiggyzone-network

  redis:
    image: redis:7-alpine
    container_name: swiggyzone-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - swiggyzone-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    container_name: swiggyzone-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - swiggyzone-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: swiggyzone-api
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/swiggyzone?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ELASTICSEARCH_NODE=http://elasticsearch:9200
      - PORT=4000
    depends_on:
      - postgres
      - redis
      - elasticsearch
    networks:
      - swiggyzone-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: swiggyzone-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
    depends_on:
      - api
    networks:
      - swiggyzone-network

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:

networks:
  swiggyzone-network:
    driver: bridge
